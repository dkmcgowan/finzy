# TestFlight Beta App Review instructions.
# Used by upload-apple.yml to update App Store Connect before submitting for review.
# Instructions content is read from docs/TESTING_INSTRUCTIONS.txt - edit that file to change what reviewers see.

feedback_email: help@getfinzy.com

# Short description for Beta App Localization (required by Apple)
beta_app_description: |
  Finzy is a Jellyfin client for iOS. Connect to your Jellyfin server to browse
  and stream your movies, TV shows, and music.

# Demo account for reviewers
# When no_password is true, TESTFLIGHT_DEMO_PASSWORD secret is not required
demo_account:
  server_url: https://demo.jellyfin.org/stable
  username: demo
  no_password: true

# Path to testing instructions (relative to repo root). Content is sent to Apple as reviewer notes.
instructions_file: docs/TESTING_INSTRUCTIONS.txt
