name: Upload to Google Play

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  upload-google-play:
    runs-on: ubuntu-latest
    if: vars.GOOGLE_PLAY_UPLOAD_ENABLED == 'true'
    permissions:
      contents: read
    steps:
      - name: Get release version
        id: release
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION=$(gh release view --json tagName -q .tagName)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download AAB from release
        run: |
          curl -L -o app-release.aab \
            "https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.version }}/app-release.aab"

      - name: Upload to Google Play
        uses: italankin/google-play-aab-uploader@1.3
        with:
          package-name: com.dkmcgowan.finzy
          aab-path: app-release.aab
          key-json: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
