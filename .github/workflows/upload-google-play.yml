name: Upload to Google Play

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  upload-google-play:
    runs-on: ubuntu-latest
    if: vars.GOOGLE_PLAY_UPLOAD_ENABLED == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get release info and create notes
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION=$(gh release view --repo ${{ github.repository }} --json tagName -q .tagName)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          RELEASE_JSON=$(gh release view "$VERSION" --repo ${{ github.repository }} --json body)
          BODY=$(echo "$RELEASE_JSON" | jq -r '.body // ""')

          mkdir -p whatsnew
          if [ -n "$BODY" ] && [ "$BODY" != "null" ]; then
            if echo "$BODY" | grep -q "Full release notes"; then
              SHORT_BODY=$(echo "$BODY" | sed -n '/Full release notes/q;p')
            else
              SHORT_BODY="$BODY"
            fi
            echo "$SHORT_BODY" | sed 's/^#* *//g' | head -c 500 > whatsnew/whatsnew-en-US
          else
            echo "What's new in $VERSION" > whatsnew/whatsnew-en-US
          fi

      - name: Download AAB from release
        run: |
          curl -L -o app-release.aab \
            "https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.version }}/app-release.aab"
          ls -la app-release.aab
          echo "AAB size: $(wc -c < app-release.aab) bytes"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements-googleplay.txt

      - name: Verify Google Play secret
        env:
          KEY_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_JSON }}
        run: |
          if [ -z "$KEY_JSON" ]; then
            echo "::error::GOOGLE_PLAY_SERVICE_JSON secret is empty or not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Secret is set (length: ${#KEY_JSON} chars)"

      - name: Upload to Google Play (Internal Testing)
        env:
          GOOGLE_PLAY_SERVICE_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_JSON }}
          GOOGLE_PLAY_RELEASE_NAME: ${{ steps.release.outputs.version }}
        run: |
          export GOOGLE_PLAY_RELEASE_NOTES="$(cat whatsnew/whatsnew-en-US 2>/dev/null || echo 'Bug fixes and improvements.')"
          python scripts/upload_google_play.py app-release.aab
