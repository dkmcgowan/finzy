name: Update Homebrew Cask

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-cask:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Download and hash release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION=$(gh release view --repo ${{ github.repository }} --json tagName -q .tagName)
          fi
          curl -L -o finzy-macos.dmg \
            "https://github.com/${{ github.repository }}/releases/download/$VERSION/finzy-macos.dmg"
          SHA256=$(shasum -a 256 finzy-macos.dmg | cut -d' ' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Update cask
        run: |
          sed -i '' "s/version \".*\"/version \"${{ steps.release.outputs.version }}\"/" Casks/finzy.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${{ steps.release.outputs.sha256 }}\"/" Casks/finzy.rb

      - name: Commit
        run: |
          BRANCH="${{ github.event.repository.default_branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/finzy.rb
          if ! git diff --staged --quiet; then
            git commit -m "chore: update cask to ${{ steps.release.outputs.version }}"
            git pull --rebase origin "$BRANCH"
            git push origin "HEAD:$BRANCH"
          else
            echo "No cask changes to commit."
          fi
