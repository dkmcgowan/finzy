name: Upload to Amazon Appstore

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  upload-amazon:
    runs-on: ubuntu-latest
    if: vars.AMAZON_UPLOAD_ENABLED == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get release info and notes
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION=$(gh release view --repo ${{ github.repository }} --json tagName -q .tagName)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          RELEASE_JSON=$(gh release view "$VERSION" --repo ${{ github.repository }} --json body)
          BODY=$(echo "$RELEASE_JSON" | jq -r '.body // ""')
          if [ -n "$BODY" ] && [ "$BODY" != "null" ]; then
            if echo "$BODY" | grep -q "Full release notes"; then
              SHORT_BODY=$(echo "$BODY" | sed -n '/Full release notes/q;p')
            else
              SHORT_BODY="$BODY"
            fi
            echo "$SHORT_BODY" | sed 's/^#* *//g' | head -c 500 > release-notes.txt
          else
            echo "What's new in $VERSION" > release-notes.txt
          fi

      - name: Download APK from release
        run: |
          curl -L -o finzy-android.apk \
            "https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.version }}/finzy-android.apk"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Upload to Amazon Appstore
        env:
          AMAZON_APPSTORE_CLIENT_ID: ${{ secrets.AMAZON_APPSTORE_CLIENT_ID }}
          AMAZON_APPSTORE_CLIENT_SECRET: ${{ secrets.AMAZON_APPSTORE_CLIENT_SECRET }}
          AMAZON_APP_ID: ${{ secrets.AMAZON_APP_ID }}
        run: |
          export AMAZON_RELEASE_NOTES="$(cat release-notes.txt)"
          python scripts/upload_amazon_appstore.py finzy-android.apk
