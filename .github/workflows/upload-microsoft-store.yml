name: Upload to Microsoft Store

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  upload-microsoft-store:
    runs-on: ubuntu-latest
    # Run on release publish when enabled, or always when manually triggered
    if: vars.MICROSOFT_STORE_UPLOAD_ENABLED == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Get release version
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION=$(gh release view --repo ${{ github.repository }} --json tagName -q .tagName)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Download MSIX packages from release
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          curl -L -o finzy-windows-x64.msix \
            "https://github.com/${{ github.repository }}/releases/download/$VERSION/finzy-windows-x64.msix"
          curl -L -o finzy-windows-arm64.msix \
            "https://github.com/${{ github.repository }}/releases/download/$VERSION/finzy-windows-arm64.msix"

      - name: Install libsecret and gnome-keyring for MSStore CLI (Linux credential store)
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-0 gnome-keyring

      - name: Setup Microsoft Store Developer CLI
        uses: microsoft/microsoft-store-apppublisher@v1.3

      - name: Configure and publish MSIX (Secret Service requires dbus-run-session on headless Linux)
        run: |
          dbus-run-session -- bash -c '
            printf "\n" | gnome-keyring-daemon --unlock
            sleep 2
            msstore reconfigure \
              --tenantId "${{ secrets.MICROSOFT_STORE_TENANT_ID }}" \
              --sellerId "${{ secrets.MICROSOFT_STORE_SELLER_ID }}" \
              --clientId "${{ secrets.MICROSOFT_STORE_CLIENT_ID }}" \
              --clientSecret "${{ secrets.MICROSOFT_STORE_CLIENT_SECRET }}"
            msstore publish . -i finzy-windows-x64.msix -id "${{ secrets.MICROSOFT_STORE_PRODUCT_ID }}"
            msstore publish . -i finzy-windows-arm64.msix -id "${{ secrets.MICROSOFT_STORE_PRODUCT_ID }}" || true
          '
