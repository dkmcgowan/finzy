# Generate finzy PNGs from assets/finzy.svg (no local image software needed).
# Run manually: Actions → "Generate icon PNGs" → Run workflow → download artifact.
name: Generate icon PNGs

on:
  workflow_dispatch:

jobs:
  generate:
    name: Generate PNGs from SVG
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Install Python deps
        run: pip install Pillow

      - name: Generate PNGs
        run: python scripts/generate_finzy_pngs.py

      - name: Upload icon PNGs
        uses: actions/upload-artifact@v5
        with:
          name: finzy-icon-pngs
          path: |
            assets/finzy.png
            assets/finzy_android_foreground.png
            assets/finzy_monochrome.png
            assets/microsoft/logo-300x300.png
            assets/microsoft/logo-150x150.png
            assets/microsoft/logo-71x71.png
            android/app/src/main/res/drawable-mdpi/tv_banner.png
            android/app/src/main/res/drawable-hdpi/tv_banner.png
            android/app/src/main/res/drawable-xhdpi/tv_banner.png
            android/app/src/main/res/drawable-xxhdpi/tv_banner.png
            android/app/src/main/res/drawable-xxxhdpi/tv_banner.png
