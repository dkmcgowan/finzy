name: Update WinGet Manifests

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-manifests:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Get release info
        id: release
        run: |
          $version = if ("${{ github.event.release.tag_name }}") { "${{ github.event.release.tag_name }}" } else {
            (Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/latest" -Headers @{ Accept = "application/vnd.github+json" }).tag_name
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $resp = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/$version" -Headers @{ Accept = "application/vnd.github+json" }
          $asset = $resp.assets | Where-Object { $_.name -eq "finzy-windows-installer.exe" } | Select-Object -First 1
          $sha256 = $asset.digest -replace "^sha256:", ""
          "sha256=$sha256" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Update manifests
        run: |
          $version = "${{ steps.release.outputs.version }}"
          $sha256 = "${{ steps.release.outputs.sha256 }}"
          $url = "https://github.com/${{ github.repository }}/releases/download/$version/finzy-windows-installer.exe"
          $manifestDir = "winget/manifests/d/dkmcgowan/finzy/$version"
          $templateDir = "winget/manifests/d/dkmcgowan/finzy/0.1.4"

          New-Item -ItemType Directory -Path $manifestDir -Force | Out-Null
          Get-ChildItem $templateDir -Filter "*.yaml" | ForEach-Object {
            $content = (Get-Content $_.FullName -Raw) `
              -replace "PackageVersion: [^\r\n]+", "PackageVersion: $version" `
              -replace "InstallerUrl: https://github\.com/[^\r\n]+", "InstallerUrl: $url" `
              -replace "InstallerSha256: [a-f0-9]+", "InstallerSha256: $sha256"
            Set-Content -Path "$manifestDir/$($_.Name)" -Value $content.TrimEnd() -NoNewline
          }

      - name: Validate manifests
        run: winget validate winget/manifests/d/dkmcgowan/finzy/${{ steps.release.outputs.version }}/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add winget/manifests/
          if (!(git diff --staged --quiet)) {
            git commit -m "chore: update winget manifests to ${{ steps.release.outputs.version }}"
            git pull --rebase origin ${{ github.event.repository.default_branch }}
            git push origin ${{ github.event.repository.default_branch }}
          }
